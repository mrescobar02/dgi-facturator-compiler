        if (characterReg.test(cufe)) {
            cufe = inputVal.replace(/[`~!@#$%^&*()_|+\=?;:'",.<>\{\}\[\]\\\/]/gi, '');
        }
        window.location.href = '/Consultas/FacturasPorCUFE/' + cufe;
    }
